<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Delirium</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
    }

    /* HEADER */
    .header {
      position: fixed;
      width: 100%;
      top: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
    }

    .logo img {
      height: 50px;
    }

    /* NAV */
    .nav a {
      margin-left: 20px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
      font-size: 14px;
    }

    .nav a:hover {
      color: #ff4fd8;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding-top: 80px;
      background: radial-gradient(circle at center, #1a1a1a, #000);
    }

    .hero-content {
      max-width: 700px;
    }

    .slogan {
      max-width: 100%;
      filter: drop-shadow(0 0 15px #ff4fd8);
    }

    .subtext {
      margin: 20px 0;
      opacity: 0.8;
      font-size: 16px;
    }

    /* BOTÓN */
    .btn {
      background: #ff4fd8;
      padding: 12px 25px;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      transition: 0.3s;
      display: inline-block;
    }

    .btn:hover {
      background: #ff2fc0;
    }

    /* SECCIONES */
    section {
      padding: 100px 30px;
      text-align: center;
    }

    .section-light {
      background: #111;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container">
      <div class="logo">
        <img src="logo.png" alt="Logo">
      </div>

      <nav class="nav">
        <a href="#inicio">Inicio</a>
        <a href="#guia">Guía</a>
        <a href="#productos">Productos</a>
        <a href="#contacto">Contacto</a>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero" id="inicio">
    <div class="hero-content">

      <img src="slogan.png" alt="The delirium of pushing forward" class="slogan">

      <p class="subtext">
        Muévete con información clara, toma mejores decisiones y evita riesgos.
      </p>

      <a href="#guia" class="btn">Ver guía</a>

    </div>
  </section>

  <!-- GUÍA -->
  <section id="guia" class="section-light">
    <h2>Guía rápida</h2>
    <p>Consejos clave para el uso responsable de CBD en espacios públicos.</p>
  </section>

  <!-- PRODUCTOS -->
  <section id="productos">
    <h2>Productos</h2>
    <p>Explora las diferentes opciones disponibles.</p>
  </section>

  <!-- CONTACTO -->
  <section id="contacto" class="section-light">
    <h2>Contacto</h2>
    <p>¿Tienes dudas? Contáctanos.</p>
  </section>

</body>
</html>
